<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundboard 🎵</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.18);
      --text: #111;
      --muted: #666;
      --hint: #aaa;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181818;
        --surface: #242424;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.18);
        --text: #f0f0f0;
        --muted: #888;
        --hint: #555;
      }
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 20px 100px;
    }

    .header {
      max-width: 960px;
      margin: 0 auto 22px;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search {
      flex: 1;
      min-width: 180px;
      max-width: 320px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .search:focus { border-color: var(--muted); }
    .search::placeholder { color: var(--hint); font-weight: 700; }

    .cats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cat {
      padding: 6px 14px;
      border: 1.5px solid var(--border-strong);
      border-radius: 99px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.12s;
    }

    .cat:hover { color: var(--text); border-color: var(--muted); }

    .cat.active {
      background: var(--text);
      color: var(--surface);
      border-color: var(--text);
    }

    /* ── GRID ── */
    .grid {
      max-width: 960px;
      margin: 20px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
    }

    /* ── SOUND CARD ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 12px 14px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .card:active { transform: scale(0.96); }

    .card.playing { border-color: var(--border-strong); }

    .card .emoji {
      font-size: 32px;
      display: block;
      margin-bottom: 10px;
      line-height: 1;
      pointer-events: none;
    }

    .card .name {
      font-size: 11px;
      font-weight: 900;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      line-height: 1.3;
      pointer-events: none;
    }

    .card .badge {
      display: inline-block;
      margin-top: 8px;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 99px;
      pointer-events: none;
    }

    /* Progress bar */
    .card .prog {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--text);
      transform: scaleX(0);
      transform-origin: left;
      opacity: 0;
      border-radius: 0 0 0 0;
    }

    .card.playing .prog {
      animation: prog var(--dur, 1s) linear forwards;
    }

    @keyframes prog {
      0%   { transform: scaleX(0); opacity: 0.4; }
      100% { transform: scaleX(1); opacity: 0.15; }
    }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(128,128,128,0.12);
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
    }

    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    /* Error state */
    .card.error { opacity: 0.45; cursor: not-allowed; }
    .card.error::after {
      content: '⚠️';
      position: absolute;
      top: 6px; right: 8px;
      font-size: 11px;
    }

    /* Empty */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--hint);
      font-size: 14px;
      font-weight: 700;
    }

    /* ── NOW PLAYING BAR ── */
    .bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border-strong);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateY(100%);
      transition: transform 0.2s ease;
      z-index: 99;
    }

    .bar.show { transform: translateY(0); }

    .bar .icon { font-size: 20px; }

    .bar .label {
      flex: 1;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar .vol {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
    }

    .bar .stop {
      padding: 6px 14px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .bar .stop:hover {
      background: var(--bg);
      color: var(--text);
    }

    /* ── SETUP NOTICE ── */
    .notice {
      max-width: 960px;
      margin: 0 auto 16px;
      background: #fffbeb;
      border: 1.5px solid #fcd34d;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #92400e;
      display: none;
    }

    .notice.show { display: block; }
    .notice a { color: #b45309; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Soundboard 🎵</h1>
    <p>Volume poussé à fond automatiquement</p>
    <div class="controls">
      <input class="search" id="q" placeholder="Rechercher..." oninput="render()">
      <div class="cats" id="cats"></div>
    </div>
  </div>

  <div class="notice" id="notice">
    ⚠️ Certains sons sont manquants. Place tes fichiers MP3 dans le dossier <code>sounds/</code>.
    Voir le <a href="README.md" target="_blank">README</a> pour savoir où les télécharger.
  </div>

  <div class="grid" id="grid"></div>

  <div class="bar" id="bar">
    <span class="icon" id="bar-icon">▶</span>
    <span class="label" id="bar-name">—</span>
    <span class="vol">🔊 MAX</span>
    <button class="stop" onclick="stopAll()">■ Stop</button>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       SONS — chaque son pointe vers sounds/fichier.mp3
       Pour ajouter un son : ajoute une entrée ici
       et place le fichier MP3 dans sounds/
    ═══════════════════════════════════════════ */
    const SOUNDS = [
      { name: 'Vine Boom',         emoji: '💥', cat: 'vine',    file: 'vine-boom.mp3'         },
      { name: 'Bruh',              emoji: '😐', cat: 'vine',    file: 'bruh.mp3'              },
      { name: 'Air Horn',          emoji: '📯', cat: 'vine',    file: 'airhorn.mp3'           },
      { name: "Okay Let's Go",     emoji: '🎮', cat: 'vine',    file: 'okay-lets-go.mp3'      },
      { name: 'Roblox Oof',        emoji: '⛏️', cat: 'gaming',  file: 'oof.mp3'               },
      { name: 'Metal Pipe',        emoji: '🔧', cat: 'gaming',  file: 'metal-pipe.mp3'        },
      { name: 'Level Up',          emoji: '⬆️', cat: 'gaming',  file: 'level-up.mp3'          },
      { name: 'Game Over',         emoji: '💀', cat: 'gaming',  file: 'game-over.mp3'         },
      { name: 'Womp Womp',         emoji: '🎺', cat: 'tiktok',  file: 'womp-womp.mp3'         },
      { name: 'Skibidi',           emoji: '🚽', cat: 'tiktok',  file: 'skibidi.mp3'           },
      { name: 'Emotional Damage',  emoji: '😭', cat: 'tiktok',  file: 'emotional-damage.mp3'  },
      { name: 'Deez Nuts',         emoji: '🥜', cat: 'tiktok',  file: 'deez-nuts.mp3'         },
      { name: 'Discord Ping',      emoji: '💬', cat: 'discord', file: 'discord-ping.mp3'      },
      { name: 'MLG Airhorn',       emoji: '🌈', cat: 'discord', file: 'mlg-airhorn.mp3'       },
      { name: 'Taco Bell',         emoji: '🔔', cat: 'discord', file: 'taco-bell.mp3'         },
      { name: 'Fart',              emoji: '💨', cat: 'discord', file: 'fart.mp3'              },
      { name: 'Windows XP',        emoji: '⛔', cat: 'classic', file: 'windows-xp.mp3'        },
      { name: 'Sad Violin',        emoji: '🎻', cat: 'classic', file: 'sad-violin.mp3'        },
      { name: 'To Be Continued',   emoji: '🌅', cat: 'classic', file: 'to-be-continued.mp3'   },
      { name: 'Dramatic Sting',    emoji: '🎬', cat: 'classic', file: 'dramatic-sting.mp3'    },
    ];

    const CATS = ['all', 'vine', 'tiktok', 'gaming', 'discord', 'classic'];
    const CAT_LABELS = {
      all: 'Tout', vine: '🌿 Vine', tiktok: '🎵 TikTok',
      gaming: '🎮 Gaming', discord: '💬 Discord', classic: '👴 Classique'
    };
    const CAT_STYLE = {
      vine:    { bg: '#dcfce7', color: '#15803d' },
      tiktok:  { bg: '#fce7f3', color: '#be185d' },
      gaming:  { bg: '#e0e7ff', color: '#4338ca' },
      discord: { bg: '#eef2ff', color: '#3730a3' },
      classic: { bg: '#fef3c7', color: '#b45309' },
    };

    /* ── State ── */
    let activeCat = 'all';
    let currentAudio = null;
    let errorCount = 0;

    /* ── Category buttons ── */
    const catsEl = document.getElementById('cats');
    CATS.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat' + (c === 'all' ? ' active' : '');
      btn.textContent = CAT_LABELS[c];
      btn.onclick = () => {
        activeCat = c;
        document.querySelectorAll('.cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      catsEl.appendChild(btn);
    });

    /* ── Play a sound ── */
    function play(sound, card) {
      // Stop current
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      document.querySelectorAll('.card.playing').forEach(c => c.classList.remove('playing'));

      const audio = new Audio('sounds/' + sound.file);
      audio.volume = 1.0; // MAX VOLUME
      currentAudio = audio;

      audio.addEventListener('canplaythrough', () => {
        audio.play().then(() => {
          card.classList.add('playing');
          card.style.setProperty('--dur', (audio.duration || 2) + 's');
          setTimeout(() => card.classList.remove('playing'), (audio.duration || 2) * 1000 + 200);

          // Now playing bar
          const bar = document.getElementById('bar');
          document.getElementById('bar-icon').textContent = sound.emoji;
          document.getElementById('bar-name').textContent = sound.name;
          bar.classList.add('show');
          clearTimeout(bar._t);
          bar._t = setTimeout(() => bar.classList.remove('show'), (audio.duration || 2) * 1000 + 2000);
        }).catch(() => markError(card));
      }, { once: true });

      audio.addEventListener('error', () => markError(card));
      audio.load();
    }

    function markError(card) {
      card.classList.add('error');
      errorCount++;
      if (errorCount > 0) document.getElementById('notice').classList.add('show');
    }

    /* ── Stop all ── */
    function stopAll() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      document.querySelectorAll('.card.playing').forEach(c => c.classList.remove('playing'));
      document.getElementById('bar').classList.remove('show');
    }

    /* ── Render grid ── */
    function render() {
      const q = document.getElementById('q').value.toLowerCase().trim();
      const list = SOUNDS.filter(s =>
        (activeCat === 'all' || s.cat === activeCat) &&
        (!q || s.name.toLowerCase().includes(q))
      );

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      errorCount = 0;
      document.getElementById('notice').classList.remove('show');

      if (!list.length) {
        grid.innerHTML = '<div class="empty">Aucun son trouvé 🔍</div>';
        return;
      }

      list.forEach(sound => {
        const card = document.createElement('div');
        card.className = 'card';
        const st = CAT_STYLE[sound.cat] || { bg: '#f0f0f0', color: '#666' };

        card.innerHTML = `
          <span class="emoji">${sound.emoji}</span>
          <span class="name">${sound.name}</span><br>
          <span class="badge" style="background:${st.bg};color:${st.color}">${CAT_LABELS[sound.cat]}</span>
          <div class="prog"></div>
        `;

        card.onclick = e => {
          if (card.classList.contains('error')) return;

          // Ripple
          const r = document.createElement('div');
          r.className = 'ripple';
          const rect = card.getBoundingClientRect();
          const size = Math.max(card.offsetWidth, card.offsetHeight) * 2;
          r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
          card.appendChild(r);
          setTimeout(() => r.remove(), 500);

          play(sound, card);
        };

        grid.appendChild(card);
      });
    }

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); stopAll(); }
    });

    render();
  </script>
</body>
</html>
